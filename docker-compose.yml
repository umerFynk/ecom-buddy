services:
  postgres:
    image: postgres:16-alpine
    container_name: ecombuddy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ecombuddy
      POSTGRES_PASSWORD: ecombuddy
      POSTGRES_DB: ecombuddy
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecombuddy -d ecombuddy"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ecombuddy-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
